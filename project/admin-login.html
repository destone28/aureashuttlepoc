<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AureaShuttle · Admin login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="js/styles.css">
  <style>
    body {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background:
        radial-gradient(circle at 15% 15%, rgba(255,140,0,.08), transparent 50%),
        radial-gradient(circle at 85% 85%, rgba(14,165,164,.12), transparent 50%),
        linear-gradient(180deg, #14171D, #1a1d24);
      padding: 24px;
      color: #fff;
    }
    .admin-card {
      background: #fff;
      color: var(--ink);
      width: 100%;
      max-width: 460px;
      border-radius: 20px;
      padding: 36px 32px;
      box-shadow: 0 30px 80px rgba(0,0,0,.4);
    }
    .admin-brand {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 16px;
    }
    .admin-brand .logo {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--primary-orange), var(--secondary-orange));
      border-radius: 10px;
      color: #fff;
      font-weight: 700; font-size: 20px;
      display: flex; align-items: center; justify-content: center;
      position: relative;
      flex-shrink: 0;
    }
    .admin-brand .logo::after {
      content: 'S';
      position: absolute;
      bottom: -4px; right: -4px;
      width: 18px; height: 18px;
      background: var(--shuttle-teal);
      border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700;
      border: 2px solid #fff;
    }
    .admin-brand .pill {
      font-size: 10px; font-weight: 700; padding: 3px 8px;
      background: var(--shuttle-teal-light); color: var(--shuttle-teal-dark);
      border-radius: 4px; letter-spacing: 0.05em;
    }
    .admin-card h1 { font-size: 22px; font-weight: 700; }
    .sso-row {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 16px;
      font-size: 13px;
    }
    .sso-row label { display: flex; gap: 6px; align-items: center; cursor: pointer; }
    .sso-row label input { accent-color: var(--shuttle-teal); }
    .sso-row a { color: var(--shuttle-teal-dark); font-weight: 700; text-decoration: none; }
    .admin-foot {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border-soft);
      font-size: 11px;
      text-align: center;
      color: var(--medium-gray);
    }
    .admin-foot a {
      color: var(--shuttle-teal-dark);
      font-weight: 600;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="admin-card slide-up">
    <div class="admin-brand">
      <div class="logo">A</div>
      <div>
        <p style="font-size:18px;font-weight:700;line-height:1.1">AureaShuttle</p>
        <p class="caption" style="margin-top:2px">Console amministrativa <span class="pill">ADMIN</span></p>
      </div>
    </div>

    <h1>Accedi alla console</h1>
    <p class="caption mb-24" style="margin-top:4px">Approvazioni corse, compagnie taxi convenzionate, KPI ESG aggregato.</p>

    <form id="loginForm">
      <div class="field">
        <label class="field-label" for="email">Email aziendale</label>
        <div class="input-container">
          <span id="ico-mail"></span>
          <input type="email" id="email" class="input" placeholder="nome.cognome@aurea.it" value="admin@aureashuttle.it" required>
        </div>
      </div>
      <div class="field">
        <label class="field-label" for="password">Password</label>
        <div class="input-container">
          <span id="ico-lock"></span>
          <input type="password" id="password" class="input" placeholder="••••••••" value="demo" required>
        </div>
      </div>
      <div class="sso-row">
        <label>
          <input type="checkbox" checked> Ricordami su questo computer
        </label>
        <a href="#" onclick="event.preventDefault();openSSO()">SSO Aurea</a>
      </div>
      <button type="submit" class="btn btn--shuttle btn--block btn--lg">Accedi alla dashboard</button>
    </form>

    <p class="caption text-center mt-20">
      <a href="index.html" style="color:var(--medium-gray);text-decoration:underline">← Torna al login paziente</a>
    </p>
    <p class="admin-foot">
      Sviluppato da <a href="https://www.linkedin.com/in/emilio-destratis-3894b2119/" target="_blank" rel="noopener">Emilio Destratis</a> · 3DSprinted
    </p>
  </div>

  <div id="toast-container"></div>

  <script src="js/icons.js"></script>
  <script src="js/navigation.js"></script>
  <script>
    document.getElementById('ico-mail').outerHTML = aIcon('mail', { size: 18 });
    document.getElementById('ico-lock').outerHTML = aIcon('lock', { size: 18 });

    (function prefill(){
      const u = getAuth();
      if (u && u.role === 'admin') { location.href = 'admin-dashboard.html'; }
    })();

    function openSSO() {
      openInfoModal({
        title: 'Accesso SSO Aurea',
        subtitle: 'Single Sign-On aziendale (SAML 2.0)',
        accent: 'shuttle',
        bodyHTML: `
          <p class="caption mb-12">Accedi con il tuo identity provider aziendale. Le credenziali admin di AureaShuttle vengono validate via SSO Aurea Suite.</p>
          <div style="display:grid;gap:8px">
            <button class="btn btn--secondary" onclick="showToast('Reindirizzamento simulato a Okta…','info')">Continua con Okta</button>
            <button class="btn btn--secondary" onclick="showToast('Reindirizzamento simulato a Microsoft Entra ID…','info')">Continua con Microsoft Entra ID</button>
            <button class="btn btn--secondary" onclick="showToast('Reindirizzamento simulato a Google Workspace…','info')">Continua con Google Workspace</button>
          </div>
          <p class="caption mt-12" style="font-size:11px">Mockup: nessun reindirizzamento reale. Configurazione SAML disponibile in produzione.</p>`,
        actions: [{ label: 'Annulla', kind: 'secondary' }]
      });
    }

    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      if (!email) return showToast('Inserisci email e password', 'error');
      setAuth({
        email,
        role: 'admin',
        name: 'Francesca Rinaldi',
        avatar: 'FR',
        apps: ['aureashuttle']
      });
      showToast('Benvenuta nella console AureaShuttle', 'shuttle');
      setTimeout(() => location.href = 'admin-dashboard.html', 600);
    });
  </script>
</body>
</html>
